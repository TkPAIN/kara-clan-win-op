<script>
    // === CONFIGURACIÓN ===
    const NAMESPACE = 'karaclan-optimizer';
    const FILES = {
        v1: 'https://raw.githubusercontent.com/TkPAIN/kara-clan-win-op/main/Optimizar_v1.bat',
        v2: 'https://raw.githubusercontent.com/TkPAIN/kara-clan-win-op/main/Optimizar_v2.bat',
        v3: 'https://raw.githubusercontent.com/TkPAIN/kara-clan-win-op/main/Optimizar_v3.bat'
    };
    // =====================

    // Descargar forzando blob para evitar mostrar el código
    async function forceDownload(url) {
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            // Extraer nombre del archivo de la URL
            const filename = url.split('/').pop();
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(blobUrl);
        } catch (err) {
            console.error('Error al descargar:', err);
            alert('No se pudo descargar el archivo. Intenta de nuevo.');
        }
    }

    // Contar y luego descargar
    function trackAndDownload(volume) {
        fetch(`https://api.countapi.xyz/hit/${NAMESPACE}/${volume}`)
            .then(() => {
                // Incremento exitoso, procedemos a descargar
                forceDownload(FILES[volume]);
                setTimeout(loadCounts, 1200);
            })
            .catch(err => {
                console.error('Error al registrar descarga:', err);
                // Aun así descargamos el archivo
                forceDownload(FILES[volume]);
            });
    }

    // Cargar contadores
    async function loadCounts() {
        const volumes = ['v1', 'v2', 'v3'];
        let total = 0;
        for (const vol of volumes) {
            try {
                const res = await fetch(`https://api.countapi.xyz/get/${NAMESPACE}/${vol}`);
                const data = await res.json();
                const count = data.value || 0;
                total += count;
                document.getElementById(`count-${vol}`).textContent = count.toLocaleString();
            } catch (e) {
                document.getElementById(`count-${vol}`).textContent = '—';
            }
        }
        document.getElementById('total').textContent = total.toLocaleString() || '—';
    }

    // Vincular eventos
    document.getElementById('btn-v1').addEventListener('click', (e) => {
        e.preventDefault();
        trackAndDownload('v1');
    });
    document.getElementById('btn-v2').addEventListener('click', (e) => {
        e.preventDefault();
        trackAndDownload('v2');
    });
    document.getElementById('btn-v3').addEventListener('click', (e) => {
        e.preventDefault();
        trackAndDownload('v3');
    });

    loadCounts();
</script>
