<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kara Clan - Optimizador Windows</title>
  <meta name="description" content="Descarga scripts para acelerar tu PC. Esencial, Avanzado y Completo. Gratis.">
  <meta property="og:title" content="Kara Clan Optimizador Windows">
  <meta property="og:description" content="Scripts PowerShell para optimizar Windows al máximo.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 1200px;
      width: 100%;
      text-align: center;
    }

    /* HEADER */
    .header {
      margin-bottom: 3rem;
    }

    .logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem;
      background: linear-gradient(135deg, #d4af37 0%, #f5d547 50%, #d4af37 100%);
      border: 3px solid #d4af37;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      color: #1a1a2e;
      font-weight: bold;
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.3);
      animation: glow 2s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 30px rgba(212, 175, 55, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.3); }
      50% { box-shadow: 0 0 50px rgba(212, 175, 55, 0.8), inset 0 0 30px rgba(255, 255, 255, 0.5); }
    }

    h1 {
      color: #d4af37;
      font-size: 3.5rem;
      letter-spacing: 4px;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
    }

    .subtitle {
      color: #b8860b;
      font-size: 0.9rem;
      letter-spacing: 2px;
      margin-bottom: 2rem;
      text-transform: uppercase;
    }

    /* LANGUAGE BUTTONS */
    .lang-selector {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .lang-btn {
      border: 2px solid #d4af37;
      background: transparent;
      color: #d4af37;
      padding: 0.5rem 1.5rem;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 0.95rem;
      transition: all 0.3s;
      letter-spacing: 1px;
    }

    .lang-btn.active {
      background: #d4af37;
      color: #1a1a2e;
      font-weight: bold;
    }

    .lang-btn:hover {
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
    }

    /* DIVIDER */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #d4af37, transparent);
      margin: 2rem 0;
    }

    /* SELECT VERSION */
    .select-label {
      color: #b8860b;
      font-size: 0.85rem;
      letter-spacing: 3px;
      margin-bottom: 2rem;
      text-transform: uppercase;
    }

    /* CARDS GRID */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin-bottom: 3rem;
    }

    .card {
      background: rgba(20, 40, 70, 0.6);
      border: 2px solid #d4af37;
      border-radius: 8px;
      padding: 2rem;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }

    .card:hover {
      border-color: #f5d547;
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
      transform: translateY(-5px);
    }

    .card-label {
      display: inline-block;
      background: #d4af37;
      color: #1a1a2e;
      padding: 0.3rem 0.8rem;
      font-size: 0.75rem;
      font-weight: bold;
      margin-bottom: 1rem;
      letter-spacing: 1px;
    }

    .card-title {
      color: #d4af37;
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
    }

    .card-desc {
      color: #a0a0a0;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .card-features {
      list-style: none;
      margin-bottom: 1.5rem;
      text-align: left;
    }

    .card-features li {
      color: #b8860b;
      padding: 0.4rem 0;
      font-size: 0.85rem;
      padding-left: 1.5rem;
      position: relative;
    }

    .card-features li:before {
      content: "▸";
      color: #d4af37;
      position: absolute;
      left: 0;
      font-weight: bold;
    }

    .card-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .btn-download {
      background: #d4af37;
      color: #1a1a2e;
      border: 2px solid #d4af37;
      padding: 0.8rem 1.5rem;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      transition: all 0.3s;
      flex: 1;
      letter-spacing: 1px;
    }

    .btn-download:hover {
      background: transparent;
      color: #d4af37;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
    }

    .btn-preview {
      background: transparent;
      color: #d4af37;
      border: 2px solid #d4af37;
      padding: 0.8rem 1.5rem;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      transition: all 0.3s;
      flex: 0.8;
      letter-spacing: 1px;
    }

    .btn-preview:hover {
      background: #d4af37;
      color: #1a1a2e;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
    }

    /* PAGINATION DOTS */
    .dots {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: transparent;
      border: 2px solid #d4af37;
      cursor: pointer;
      transition: all 0.3s;
    }

    .dot.active {
      background: #d4af37;
      box-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
    }

    /* FOOTER */
    .footer {
      text-align: center;
      color: #707070;
      font-size: 0.85rem;
      line-height: 1.8;
      margin-top: 2rem;
    }

    .footer p {
      margin: 0.3rem 0;
    }

    .footer .check {
      color: #d4af37;
      margin-right: 0.5rem;
    }

    @media (max-width: 768px) {
      h1 { font-size: 2.5rem; }
      .cards-grid { grid-template-columns: 1fr; gap: 1.5rem; }
      .logo { width: 100px; height: 100px; font-size: 3rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <!-- HEADER -->
  <div class="header">
    <div class="logo">KA</div>
    <h1>KARA CLAN</h1>
    <div class="subtitle">Windows Optimizer</div>
    
    <!-- LANGUAGE SELECTOR -->
    <div class="lang-selector">
      <button class="lang-btn active" onclick="setLang('es')">ES</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- SELECT VERSION -->
  <div class="select-label" data-es="— SELECCIONA UNA VERSIÓN —" data-en="— SELECT A VERSION —">— SELECCIONA UNA VERSIÓN —</div>

  <!-- CARDS -->
  <div class="cards-grid" id="cardsContainer">
    <!-- Cards will be generated by JavaScript -->
  </div>

  <!-- PAGINATION DOTS -->
  <div class="dots">
    <div class="dot active" onclick="selectCard(0)"></div>
    <div class="dot" onclick="selectCard(1)"></div>
    <div class="dot" onclick="selectCard(2)"></div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <p><span class="check">✓</span> Must be run as Administrator in PowerShell</p>
    <p><span class="check">✓</span> Compatible with Windows 10 / 11</p>
    <p><span class="check">✓</span> Free - Kara Clan</p>
  </div>
</div>

<script>
  const cardsData = {
    es: [
      {
        label: "VOL. 1",
        title: "ESENCIAL",
        desc: "Optimización básica de red. Nagle, DNS y actualizaciones.",
        features: ["Nagle OFF", "DNS Cloudflare", "P2P Updates OFF", "8 mejoras"],
        file: "OptimizarWindows_v1.ps1"
      },
      {
        label: "VOL. 2",
        title: "ADVANCED",
        desc: "Todo Vol.1 plus GPU Priority, Game Mode, SysMain OFF.",
        features: ["Get DSCP x8", "GPU Priority", "Game Mode", "17 mejoras"],
        file: "OptimizarWindows_v2.ps1"
      },
      {
        label: "VOL. 3 - FIXED",
        title: "COMPLETE",
        desc: "Servicios, avanzado registro, disco y memoria. Total.",
        features: ["TRIM", "NTFS", "Limpieza automática", "20 mejoras"],
        file: "OptimizarWindows_v3.ps1"
      }
    ],
    en: [
      {
        label: "VOL. 1",
        title: "ESSENTIAL",
        desc: "Basic network optimization. Nagle, DNS and updates.",
        features: ["Nagle OFF", "Cloudflare DNS", "P2P Updates OFF", "8 tweaks"],
        file: "OptimizarWindows_v1.ps1"
      },
      {
        label: "VOL. 2",
        title: "ADVANCED",
        desc: "All Vol.1 plus GPU Priority, Game Mode, SysMain OFF.",
        features: ["Get DSCP x8", "GPU Priority", "Game Mode", "17 tweaks"],
        file: "OptimizarWindows_v2.ps1"
      },
      {
        label: "VOL. 3 - FIXED",
        title: "COMPLETE",
        desc: "Services, advanced registry, disk and memory. Complete.",
        features: ["TRIM", "NTFS", "Auto cleanup", "20 tweaks"],
        file: "OptimizarWindows_v3.ps1"
      }
    ]
  };

  let currentLang = 'es';

  function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    renderCards();
  }

  function renderCards() {
    const container = document.getElementById('cardsContainer');
    container.innerHTML = cardsData[currentLang].map((card, idx) => `
      <div class="card">
        <div class="card-label">${card.label}</div>
        <div class="card-title">${card.title}</div>
        <div class="card-desc">${card.desc}</div>
        <ul class="card-features">
          ${card.features.map(f => `<li>${f}</li>`).join('')}
        </ul>
        <div class="card-buttons">
          <button class="btn-download" onclick="downloadAndExecute('${card.file}')">⬇ Download & Run</button>
          <button class="btn-preview">▶ Preview</button>
        </div>
      </div>
    `).join('');
  }

  function downloadAndExecute(filename) {
    // Method: Generate a launcher script that downloads and executes the main script
    const launcherScript = `
# Kara Clan - Windows Optimizer Launcher
# This script downloads and executes the optimizer with proper permissions

$url = "https://raw.githubusercontent.com/TkPAIN/kara-clan-win-op/main/${filename}"
$tempPath = "$env:TEMP\\${filename}"

# Verify admin
if (-NOT ([Security.Principal.WindowsPrincipal][Security.Principal.WindowsIdentity]::GetCurrent()).IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)) {
    Write-Host "ERROR: Este script debe ejecutarse como Administrador" -ForegroundColor Red
    Write-Host "Clic derecho > 'Ejecutar con PowerShell' (como admin)" -ForegroundColor Yellow
    pause
    exit
}

Write-Host "Descargando ${filename}..." -ForegroundColor Cyan
try {
    Invoke-WebRequest -Uri $url -OutFile $tempPath -ErrorAction Stop
    Write-Host "✓ Descarga completada" -ForegroundColor Green
} catch {
    Write-Host "✗ Error al descargar: $_" -ForegroundColor Red
    pause
    exit
}

Write-Host "Ejecutando script..." -ForegroundColor Cyan
Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
& $tempPath
`;

    // Trigger download of launcher script
    const blob = new Blob([launcherScript], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename.replace('.ps1', '_launcher.ps1');
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    alert(`✓ Descargado: ${a.download}\n\n1. Haz clic derecho sobre el archivo\n2. Selecciona "Ejecutar con PowerShell"\n3. Confirma los permisos de administrador`);
  }

  function selectCard(idx) {
    document.querySelectorAll('.dot').forEach((dot, i) => {
      dot.classList.toggle('active', i === idx);
    });
  }

  // Initialize
  renderCards();
</script>

</body>
</html>
